name: Deploy to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: |
        cd backend
        npm install

    - name: Generate Prisma Client
      run: |
        cd backend
        npx prisma generate

    - name: Login to Azure
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_EE908C73504B45449F8E53FD54C271B8 }}
        tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_448FE0AD6FE84844AF97F80611074CFF }}
        subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_88F0397DA72946A7B02122AD713744FF }}

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'thecollabify-api'
        slot-name: 'Production'
        package: ./backend

    - name: Clear Azure platform CORS (let Express handle it)
      continue-on-error: true
      run: |
        # Azure App Service has its own CORS handler that intercepts OPTIONS
        # requests BEFORE they reach Express. We must disable it so our
        # Express CORS middleware runs instead.
        # Method 1: Remove all allowed origins via `az webapp cors`
        az webapp cors remove --name thecollabify-api \
          --resource-group TheCollabify \
          --allowed-origins '*' 2>/dev/null || true
        # Method 2: Directly set empty allowedOrigins array via resource update
        az resource update \
          --name web \
          --resource-group TheCollabify \
          --namespace Microsoft.Web \
          --resource-type config \
          --parent sites/thecollabify-api \
          --set properties.cors.allowedOrigins='[]' \
          --set properties.cors.supportCredentials=false \
          2>/dev/null || true
        echo "Azure platform CORS cleared — Express handles CORS now"

    - name: Run Database Migrations
      continue-on-error: true
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: |
        cd backend
        npx prisma db push --accept-data-loss
